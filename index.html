<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Kalkulator</title>

<style>
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial;
  }

  .kalkulator {
    width: 260px;
    background: black;
  }

  .ekran {
    color: white;
    font-size: 40px;
    text-align: right;
    padding: 20px;
    word-wrap: break-word;
  }

  .przyciski {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }

  button {
    height: 60px;
    font-size: 20px;
    border: none;
    border-radius: 50%;
    cursor: pointer;
  }

  .szare { background: #a5a5a5; }
  .ciemne { background: #333; color: white; }
  .pomaranczowe { background: orange; color: white; }

  .zero {
    grid-column: span 2;
    border-radius: 30px;
  }
</style>
</head>

<body>

<div class="kalkulator">
  <div class="ekran" id="ekran">0</div>

  <div class="przyciski">
    <button class="szare" onclick="wyczysc()">C</button>
    <button class="szare" onclick="usun()">←</button>
    <button class="szare" onclick="dodaj('%')">%</button>
    <button class="pomaranczowe" onclick="dodaj('/')">÷</button>

    <button class="ciemne" onclick="dodaj('7')">7</button>
    <button class="ciemne" onclick="dodaj('8')">8</button>
    <button class="ciemne" onclick="dodaj('9')">9</button>
    <button class="pomaranczowe" onclick="dodaj('*')">×</button>

    <button class="ciemne" onclick="dodaj('4')">4</button>
    <button class="ciemne" onclick="dodaj('5')">5</button>
    <button class="ciemne" onclick="dodaj('6')">6</button>
    <button class="pomaranczowe" onclick="dodaj('-')">−</button>

    <button class="ciemne" onclick="dodaj('1')">1</button>
    <button class="ciemne" onclick="dodaj('2')">2</button>
    <button class="ciemne" onclick="dodaj('3')">3</button>
    <button class="pomaranczowe" onclick="dodaj('+')">+</button>

    <button class="ciemne zero" onclick="dodaj('0')">0</button>
    <button class="ciemne" onclick="dodaj('.')">.</button>
    <button class="pomaranczowe" onclick="oblicz()">=</button>
  </div>
</div>

<script>
let ekran = document.getElementById("ekran");

function dodaj(znak) {
  if (ekran.innerText === "0") {
    ekran.innerText = znak;
  } else {
    ekran.innerText += znak;
  }
}

function wyczysc() {
  ekran.innerText = "0";
}

function usun() {
  ekran.innerText = ekran.innerText.slice(0, -1);
  if (ekran.innerText === "") ekran.innerText = "0";
}

function oblicz() {
  try {
    ekran.innerText = eval(ekran.innerText);
  } catch {
    ekran.innerText = "Błąd";
  }
}
</script>

</body>
</html>
